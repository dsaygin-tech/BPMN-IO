<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPMN-IO</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-group">
        <button type="button" id="btn-new" title="New diagram (Ctrl+N)">New</button>
        <button type="button" id="btn-open" title="Open file (Ctrl+O)">Open</button>
        <button type="button" id="btn-save" title="Save (Ctrl+S)">Save</button>
        <button type="button" id="btn-save-as" title="Save as (Ctrl+Shift+S)">Save As</button>
        <div class="dropdown">
          <button type="button" id="btn-export" title="Export diagram">Export ▾</button>
          <div class="dropdown-menu" id="export-menu"></div>
        </div>
      </div>
      <div class="toolbar-group">
        <button type="button" id="btn-simulation" class="primary" title="Toggle token simulation (Ctrl+Shift+T)">
          Token Simulation
        </button>
        <button
          type="button"
          id="btn-export-simulation"
          class="primary"
          title="Export token simulation as animated GIF or WebM"
        >
          Export Animation
        </button>
      </div>
      <div class="toolbar-group toolbar-status">
        <span id="file-name">Untitled</span>
        <span id="dirty-indicator" hidden>•</span>
      </div>
    </header>

    <div id="drop-overlay" class="drop-overlay">
      <div class="drop-overlay-box">
        <span>Drop BPMN file to open</span>
      </div>
    </div>

    <dialog id="recording-dialog" class="recording-dialog">
      <form method="dialog" class="recording-dialog-content">
        <h2>Export simulation animation</h2>
        <p id="recording-mode-description">
          Simulation starts automatically from the beginning. Recording stops when all tokens finish.
        </p>
        <label class="recording-field">
          <span>Recording mode</span>
          <select id="recording-mode">
            <option value="auto">Automatic — full run from start</option>
            <option value="interactive">Interactive — you control the simulation</option>
          </select>
        </label>
        <label class="recording-field">
          <span>Format</span>
          <select id="recording-format">
            <option value="simulation-gif">GIF — opens everywhere</option>
            <option value="simulation-webm">WebM — smoother video</option>
          </select>
        </label>
        <label class="recording-field">
          <span>Recording area</span>
          <select id="recording-crop-mode">
            <option value="diagram">Entire diagram</option>
            <option value="viewport">Current view</option>
            <option value="tight">Tight crop</option>
            <option value="custom">Custom padding</option>
            <option value="manual">Draw with mouse</option>
          </select>
        </label>
        <p id="recording-crop-hint" class="recording-crop-hint" hidden>
          After clicking Start export, drag on the diagram to select the recording area.
        </p>
        <label class="recording-field" id="recording-crop-padding-field" hidden>
          <span>Padding (px)</span>
          <input id="recording-crop-padding" type="number" min="0" max="500" value="48" />
        </label>
        <div class="recording-actions">
          <button type="button" id="recording-cancel">Cancel</button>
          <button type="button" id="recording-start" class="primary">Start export</button>
        </div>
      </form>
    </dialog>

    <div id="recording-progress" class="recording-overlay">
      <div class="recording-overlay-card">
        <div class="recording-indicator">REC</div>
        <progress id="recording-progress-bar" max="100" value="0"></progress>
        <p id="recording-progress-label">Recording simulation... 0%</p>
        <div class="recording-overlay-actions">
          <button type="button" id="recording-progress-stop" class="primary" hidden>Stop recording</button>
          <button type="button" id="recording-progress-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <main class="workspace">
      <div id="canvas" class="canvas"></div>
      <aside id="properties-panel" class="properties-panel open">
        <div id="properties-panel-resizer" class="properties-panel-resizer" draggable="true">
          <div class="properties-panel-resize-handle"></div>
        </div>
      </aside>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
